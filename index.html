<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>근호 밖으로 꺼내기 챌린지</title>
    <style>
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            text-align: center; 
            background-color: #f4f7f6; 
            padding: 20px; 
            margin: 0;
        }
        #game-container { 
            background: white; 
            max-width: 450px; 
            margin: 0 auto; 
            padding: 30px 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h1 { color: #333; font-size: 26px; margin-bottom: 10px; }
        p.guide { color: #666; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
        
        /* ⭐️ 수정한 부분: 루트 기호와 지붕(윗선) 디자인 */
        .question-box { 
            margin: 30px 0; 
            display: flex;
            justify-content: center;
        }
        .math-root {
            display: inline-flex;
            align-items: flex-start;
            color: #2c3e50;
        }
        .math-root .symbol {
            font-size: 70px; /* 루트 꼬리 크기 */
            line-height: 1;
            font-family: 'Times New Roman', serif; /* 기호가 가장 예쁘게 나오는 폰트 */
            margin-right: -2px; /* 간격 미세 조정 */
        }
        .math-root .number {
            font-size: 60px;
            font-weight: bold;
            border-top: 5px solid #2c3e50; /* ⭐️ 루트 지붕(윗선) 생성 */
            padding: 5px 15px 0 5px; /* 숫자 주변 여백 */
            margin-top: 13px; /* 지붕과 기호 연결 위치 조정 */
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* 4지선다 버튼 그리드 스타일 */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .option-btn {
            background-color: #ffffff;
            color: #333;
            border: 2px solid #4CAF50;
            padding: 20px 10px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .option-btn:hover {
            background-color: #e8f5e9;
            transform: translateY(-2px);
        }
        
        /* 정답/오답 시 버튼 색상 변화 */
        .option-btn.correct-btn {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
        .option-btn.wrong-btn {
            background-color: #f44336;
            color: white;
            border-color: #f44336;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        #message { 
            font-size: 20px; 
            font-weight: bold; 
            margin-top: 15px; 
            min-height: 30px; 
        }
        .correct-text { color: #2e7d32; }
        .wrong-text { color: #d32f2f; }
        
        #score-board { 
            font-size: 18px; 
            color: #444; 
            background: #e8f5e9;
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🎯 근호 밖으로 꺼내기 챌린지</h1>
    <p class="guide">
        주어진 수의 근호를 최대한 간단히 한 것을 고르세요!<br>
    </p>

    <div id="score-board">현재 점수: <span id="score">0</span>점</div>

    <div class="question-box">
        <div class="math-root">
            <span class="symbol">&radic;</span>
            <span class="number" id="question-number">8</span>
        </div>
    </div>

    <div class="options-grid" id="options-container">
        </div>

    <div id="message"></div>
</div>

<script>
    const questions = [
        { q: 4, options: ["2", "4", "2√2", "1"], answer: "2" },
        { q: 8, options: ["2√2", "4√2", "2√4", "8"], answer: "2√2" },
        { q: 9, options: ["3", "9", "3√3", "1"], answer: "3" },
        { q: 16, options: ["4", "8", "2√4", "4√2"], answer: "4" },
        { q: 18, options: ["3√2", "2√3", "9√2", "2√9"], answer: "3√2" },
        { q: 20, options: ["2√5", "5√2", "4√5", "2√10"], answer: "2√5" },
        { q: 24, options: ["2√6", "6√2", "4√6", "3√8"], answer: "2√6" },
        { q: 25, options: ["5", "25", "5√5", "1"], answer: "5" },
        { q: 32, options: ["4√2", "2√4", "8√2", "2√16"], answer: "4√2" },
        { q: 36, options: ["6", "18", "6√6", "4√9"], answer: "6" },
        { q: 45, options: ["3√5", "5√3", "9√5", "3√15"], answer: "3√5" },
        { q: 48, options: ["4√3", "3√4", "8√3", "2√12"], answer: "4√3" },
        { q: 49, options: ["7", "14", "7√7", "1"], answer: "7" },
        { q: 50, options: ["5√2", "2√5", "10√5", "5√10"], answer: "5√2" },
        { q: 52, options: ["2√13", "13√2", "4√13", "2√26"], answer: "2√13" },
        { q: 64, options: ["8", "16", "8√8", "4√4"], answer: "8" },
        { q: 81, options: ["9", "18", "9√9", "3√3"], answer: "9" },
        { q: 100, options: ["10", "50", "10√10", "5√2"], answer: "10" }
    ];

    let currentQuestion = null;
    let score = 0;
    let isAnswering = false; 

    function nextQuestion() {
        isAnswering = false;
        document.getElementById('message').innerText = '';
        
        const randomIndex = Math.floor(Math.random() * questions.length);
        currentQuestion = questions[randomIndex];
        
        document.getElementById('question-number').innerText = currentQuestion.q;
        
        let shuffledOptions = [...currentQuestion.options];
        shuffledOptions.sort(() => Math.random() - 0.5);

        const container = document.getElementById('options-container');
        container.innerHTML = ''; 

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt);
            container.appendChild(btn);
        });
    }

    function checkAnswer(clickedBtn, selectedAnswer) {
        if (isAnswering) return; 
        isAnswering = true;

        const messageEl = document.getElementById('message');
        const allButtons = document.querySelectorAll('.option-btn');

        if (selectedAnswer === currentQuestion.answer) {
            clickedBtn.classList.add('correct-btn');
            messageEl.innerText = "🎉 정답입니다! 훌륭해요!";
            messageEl.className = "correct-text";
            score += 10;
            document.getElementById('score').innerText = score;
            
            setTimeout(nextQuestion, 1000); 
        } else {
            clickedBtn.classList.add('wrong-btn');
            messageEl.innerText = "❌ 다시 한 번 생각해 볼까요?";
            messageEl.className = "wrong-text";
            
            allButtons.forEach(btn => {
                if (btn.innerText === currentQuestion.answer) {
                    btn.classList.add('correct-btn');
                }
            });

            setTimeout(nextQuestion, 2000);
        }
    }

    window.onload = nextQuestion;
</script>

</body>
</html>
