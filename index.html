<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>근호 밖으로 꺼내기 60초 챌린지</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            text-align: center; 
            background-color: #f4f7f6; 
            padding: 20px; 
            margin: 0;
            color: #333;
        }
        #game-container { 
            background: white; 
            max-width: 450px; 
            margin: 0 auto; 
            padding: 30px 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            position: relative;
        }
        h1 { font-size: 26px; margin-bottom: 10px; }
        
        /* 화면 숨김용 클래스 */
        .hidden { display: none !important; }

        /* 시작 & 결과 화면 스타일 */
        .screen-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }
        .guide { color: #666; font-size: 16px; margin-bottom: 30px; line-height: 1.6; }
        .big-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .big-btn:hover { background-color: #45a049; transform: translateY(-2px); }

        /* 게임 화면 스타일 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            background: #e8f5e9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .time-warning { color: #d32f2f; animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .question-box { 
            font-size: 60px; 
            margin: 30px 0; 
            color: #2c3e50; 
            padding: 20px;
            background: #f8fcfb;
            border-radius: 15px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .option-btn {
            background-color: #ffffff;
            color: #333;
            border: 2px solid #4CAF50;
            padding: 20px 10px;
            font-size: 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .option-btn:hover { background-color: #e8f5e9; }
        
        .option-btn.correct-btn { background-color: #4CAF50 !important; color: white !important; border-color: #4CAF50 !important; }
        .option-btn.wrong-btn { background-color: #f44336 !important; color: white !important; border-color: #f44336 !important; animation: shake 0.4s; }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .option-btn .katex { color: inherit; }
        #message { font-size: 20px; font-weight: bold; margin-top: 15px; min-height: 30px; }
        .correct-text { color: #2e7d32; }
        .wrong-text { color: #d32f2f; }
        
        #final-score { font-size: 48px; color: #4CAF50; margin: 20px 0; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🎯 근호 밖으로 꺼내기</h1>

    <div id="start-screen" class="screen-box">
        <p class="guide">
            <strong>60초</strong> 동안 최대한 많은 문제를 푸세요!<br><br>
            주어진 수의 근호를 최대한<br>간단히 한 것을 고르면 됩니다.
        </p>
        <button class="big-btn" onclick="startGame()">도전 시작!</button>
    </div>

    <div id="play-screen" class="hidden">
        <div class="status-bar">
            <div>남은 시간: <span id="time-left">60</span>초</div>
            <div>점수: <span id="score">0</span>점</div>
        </div>

        <div class="question-box" id="question-box"></div>
        <div class="options-grid" id="options-container"></div>
        <div id="message"></div>
    </div>

    <div id="result-screen" class="screen-box hidden">
        <h2>⏰ 시간 종료!</h2>
        <p class="guide">당신의 최종 점수는...</p>
        <div id="final-score">0점</div>
        <button class="big-btn" onclick="startGame()">다시 도전하기</button>
    </div>
</div>

<script>
    const questions = [
        { q: "4", options: ["2", "4", "2\\sqrt{2}", "1"], answer: "2" },
        { q: "8", options: ["2\\sqrt{2}", "4\\sqrt{2}", "2\\sqrt{4}", "8"], answer: "2\\sqrt{2}" },
        { q: "9", options: ["3", "9", "3\\sqrt{3}", "1"], answer: "3" },
        { q: "16", options: ["4", "8", "2\\sqrt{4}", "4\\sqrt{2}"], answer: "4" },
        { q: "18", options: ["3\\sqrt{2}", "2\\sqrt{3}", "9\\sqrt{2}", "2\\sqrt{9}"], answer: "3\\sqrt{2}" },
        { q: "20", options: ["2\\sqrt{5}", "5\\sqrt{2}", "4\\sqrt{5}", "2\\sqrt{10}"], answer: "2\\sqrt{5}" },
        { q: "24", options: ["2\\sqrt{6}", "6\\sqrt{2}", "4\\sqrt{6}", "3\\sqrt{8}"], answer: "2\\sqrt{6}" },
        { q: "25", options: ["5", "25", "5\\sqrt{5}", "1"], answer: "5" },
        { q: "32", options: ["4\\sqrt{2}", "2\\sqrt{4}", "8\\sqrt{2}", "2\\sqrt{16}"], answer: "4\\sqrt{2}" },
        { q: "36", options: ["6", "18", "6\\sqrt{6}", "4\\sqrt{9}"], answer: "6" },
        { q: "45", options: ["3\\sqrt{5}", "5\\sqrt{3}", "9\\sqrt{5}", "3\\sqrt{15}"], answer: "3\\sqrt{5}" },
        { q: "48", options: ["4\\sqrt{3}", "3\\sqrt{4}", "8\\sqrt{3}", "2\\sqrt{12}"], answer: "4\\sqrt{3}" },
        { q: "49", options: ["7", "14", "7\\sqrt{7}", "1"], answer: "7" },
        { q: "50", options: ["5\\sqrt{2}", "2\\sqrt{5}", "10\\sqrt{5}", "5\\sqrt{10}"], answer: "5\\sqrt{2}" },
        { q: "52", options: ["2\\sqrt{13}", "13\\sqrt{2}", "4\\sqrt{13}", "2\\sqrt{26}"], answer: "2\\sqrt{13}" },
        { q: "64", options: ["8", "16", "8\\sqrt{8}", "4\\sqrt{4}"], answer: "8" },
        { q: "81", options: ["9", "18", "9\\sqrt{9}", "3\\sqrt{3}"], answer: "9" },
        { q: "100", options: ["10", "50", "10\\sqrt{10}", "5\\sqrt{2}"], answer: "10" }
    ];

    let currentQuestion = null;
    let score = 0;
    let timeLeft = 60;
    let timerInterval = null;
    let isAnswering = false; 

    // 화면 전환 함수
    function showScreen(screenId) {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('play-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById(screenId).classList.remove('hidden');
    }

    // 게임 시작
    function startGame() {
        score = 0;
        timeLeft = 60;
        document.getElementById('score').innerText = score;
        document.getElementById('time-left').innerText = timeLeft;
        document.getElementById('time-left').classList.remove('time-warning');
        
        showScreen('play-screen');
        nextQuestion();
        
        // 1초마다 타이머 감소
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            const timeSpan = document.getElementById('time-left');
            timeSpan.innerText = timeLeft;
            
            if (timeLeft <= 10) timeSpan.classList.add('time-warning'); // 10초 남으면 빨간색 깜빡임
            
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    // 게임 종료
    function endGame() {
        clearInterval(timerInterval);
        document.getElementById('final-score').innerText = score + "점";
        showScreen('result-screen');
    }

    // 다음 문제 로드
    function nextQuestion() {
        if (timeLeft <= 0) return;
        isAnswering = false;
        document.getElementById('message').innerText = '';
        
        const randomIndex = Math.floor(Math.random() * questions.length);
        currentQuestion = questions[randomIndex];
        
        const qBox = document.getElementById('question-box');
        katex.render("\\sqrt{" + currentQuestion.q + "}", qBox, { displayMode: true, throwOnError: false });
        
        let shuffledOptions = [...currentQuestion.options];
        shuffledOptions.sort(() => Math.random() - 0.5);

        const container = document.getElementById('options-container');
        container.innerHTML = ''; 

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            
            katex.render(opt, btn, { throwOnError: false });
            
            btn.onclick = () => checkAnswer(btn, opt);
            container.appendChild(btn);
        });
    }

    // 정답 확인
    function checkAnswer(clickedBtn, selectedAnswer) {
        if (isAnswering || timeLeft <= 0) return; 
        isAnswering = true;

        const messageEl = document.getElementById('message');

        if (selectedAnswer === currentQuestion.answer) {
            clickedBtn.classList.add('correct-btn');
            messageEl.innerText = "🎉 정답!";
            messageEl.className = "correct-text";
            score += 10;
            document.getElementById('score').innerText = score;
            
            setTimeout(nextQuestion, 500); // 정답이면 0.5초만에 빠르게 다음 문제로
        } else {
            clickedBtn.classList.add('wrong-btn');
            messageEl.innerText = "❌ 오답!";
            messageEl.className = "wrong-text";
            
            // 오답 시 정답을 확인할 수 있도록 1.5초 후 다음 문제로
            setTimeout(nextQuestion, 1500);
        }
    }
</script>

</body>
</html>
